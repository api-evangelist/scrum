name: Scrum
description: Scrum is an agile project management framework that organizes work into
  fixed-length iterations called sprints, typically lasting two to four weeks. It
  defines clear roles (Product Owner, Scrum Master, Developers) and ceremonies (sprint
  planning, daily standups, retrospectives) to enable teams to deliver value incrementally
  and continuously improve.
